<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartel Exchange - High Stakes</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background: black url('image_0.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #d1d1d1;
        }

        .container {
            background: rgba(10, 10, 10, 0.95);
            padding: 30px;
            border-radius: 8px;
            border: 2px solid #5a0000;
            box-shadow: 0 0 40px rgba(139, 0, 0, 0.7);
            width: 95%;
            max-width: 550px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        #timer-box {
            font-size: 3.5em;
            color: #444; 
            margin-bottom: 10px;
            transition: color 0.5s;
        }

        .timer-label { font-size: 0.25em; display: block; color: #888; letter-spacing: 2px; }

        h1 { color: #c4c4c4; text-transform: uppercase; letter-spacing: 3px; margin: 5px 0; }

        #bid-alert { height: 25px; color: #f1c40f; font-weight: bold; margin: 15px 0; text-transform: uppercase; font-size: 0.9em; }

        .current-price {
            font-size: 3.8em;
            color: #ff3333;
            margin: 15px 0;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }

        input {
            width: 80%; padding: 12px; margin: 8px 0;
            border: 1px solid #333; border-radius: 4px;
            background-color: rgba(20, 20, 20, 0.9);
            color: #e0e0e0; text-align: center; font-family: inherit; font-size: 1.1em;
        }

        .buttons { display: flex; gap: 15px; justify-content: center; margin-top: 10px; }

        button {
            padding: 15px; border: 1px solid #444; border-radius: 4px;
            cursor: pointer; transition: 0.3s; font-weight: bold;
            font-family: inherit; text-transform: uppercase; flex: 1;
        }

        .btn-fast { background-color: #1a3a5a; color: #fff; }
        .btn-custom { background-color: #4a1a5a; color: #fff; }
        
        button:disabled { background-color: #111; color: #333; cursor: not-allowed; border: 1px solid #000; }

        .error { color: #ff4444; background: rgba(255, 0, 0, 0.1); padding: 10px; border-radius: 4px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="timer-box">
        <span class="timer-label" id="timer-status">CZEKAMY NA OTWARCIE</span>
        <span id="time-display">09:00</span>
    </div>

    <h1>Kartel Exchange</h1>
    
    <div id="bid-alert">CENA WYWOŁAWCZA: 100 000 $</div>
    <div class="current-price" id="display-price">100 000 $</div>

    <div id="status-text" style="color: #888; font-size: 0.9em;">BRAK OFERT</div>

    <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

    <div id="controls">
        <input type="password" id="user-pass" placeholder="HASŁO EKIPY">
        <input type="number" id="custom-amount" placeholder="STAWKA (MIN. +10 000 $)">

        <div class="buttons">
            <button id="b1" class="btn-fast" onclick="bid(10000)">Podbij o 10k</button>
            <button id="b2" class="btn-custom" onclick="bidCustom()">Własna stawka</button>
        </div>
    </div>

    <div id="error-msg" class="error"></div>
</div>

<script>
    const groups = {
        "g1": { id: "grupa1", name: "EKIPA MADRYT", pass: "madryt123" },
        "g2": { id: "grupa2", name: "EKIPA MEDELLIN", pass: "medellin123" }
    };

    let currentPrice = 100000; // Start od 100k
    let lastBidderId = "";
    let timeLeft = 520; 
    let auctionStarted = false;
    let auctionActive = true;
    let timerInterval = null;

    function startTimer() {
        auctionStarted = true;
        document.getElementById('timer-status').innerText = "POZOSTAŁY CZAS";
        document.getElementById('timer-box').style.color = "#f1c40f";
        
        timerInterval = setInterval(() => {
            if (!auctionActive) return;
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) endAuction();
        }, 1000);
    }

    function updateTimerDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById('time-display').innerText = 
            `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        
        if (timeLeft <= 15) {
            document.getElementById('time-display').style.color = "#ff3333";
        }
    }

    function bid(amount) {
        if (!auctionActive) return;

        const passInput = document.getElementById('user-pass').value;
        const errorDiv = document.getElementById('error-msg');
        errorDiv.style.display = "none";

        let currentGroup = null;
        for (let key in groups) {
            if (groups[key].pass === passInput) {
                currentGroup = groups[key];
                break;
            }
        }

        if (!currentGroup) {
            showError("BRAK DOSTĘPU.");
            return;
        }

        if (currentGroup.id === lastBidderId) {
            showError("TWOJA EKIPA JUŻ PROWADZI.");
            return;
        }

        if (amount < 10000) {
            showError("MINIMALNE PRZEBICIE TO 10 000 $.");
            return;
        }

        // Pierwsze podbicie aktywuje wszystko
        if (!auctionStarted) {
            startTimer();
        }

        currentPrice += amount;
        lastBidderId = currentGroup.id;

        // Logika 15 sekund
        if (timeLeft < 10) {
            timeLeft = 15;
            document.getElementById('bid-alert').innerText = "GORĄCA KOŃCÓWKA: 15s!";
        } else {
            document.getElementById('bid-alert').innerText = currentGroup.name + " PRZEJMUJE KONTROLĘ!";
        }

        updateUI(currentGroup.name);
        clearInputs();
    }

    function bidCustom() {
        const val = parseInt(document.getElementById('custom-amount').value);
        if (isNaN(val)) return showError("WPISZ KWOTĘ.");
        bid(val);
    }

    function updateUI(name) {
        document.getElementById('display-price').innerText = currentPrice.toLocaleString('pl-PL') + " $";
        document.getElementById('status-text').innerText = "PROWADZI: " + name;
    }

    function endAuction() {
        auctionActive = false;
        clearInterval(timerInterval);
        document.getElementById('time-display').innerText = "KONIEC";
        document.getElementById('timer-status').innerText = "ZAKOŃCZONO";
        document.getElementById('bid-alert').innerText = "SPRZEDANE!";
        document.getElementById('b1').disabled = true;
        document.getElementById('b2').disabled = true;
    }

    function showError(text) {
        const errorDiv = document.getElementById('error-msg');
        errorDiv.innerText = text;
        errorDiv.style.display = "block";
    }

    function clearInputs() {
        document.getElementById('user-pass').value = "";
        document.getElementById('custom-amount').value = "";
    }
</script>

</body>
</html>
